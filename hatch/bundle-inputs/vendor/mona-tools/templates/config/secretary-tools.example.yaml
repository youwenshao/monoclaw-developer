mona_secretary_tools:
  enabled: false
  binaries_root: "~/.monoclaw/vendor/mona-tools/bin"
  read_only_by_default: true
  whatsapp:
    enabled: false
    command: "~/.monoclaw/vendor/mona-tools/bin/wacrawl"
  slack:
    enabled: false
    command: "~/.monoclaw/vendor/mona-tools/bin/slacrawl"
  summarize:
    enabled: false
    command: "~/.monoclaw/vendor/mona-tools/bin/summarize"
  github_triage:
    enabled: false
    command: "~/.monoclaw/vendor/mona-tools/bin/ghcrawl"
  vox_phone_bridge:
    enabled: false
    command: "~/.monoclaw/vendor/mona-tools/bin/vox"
    serve_args: ["serve", "--host", "127.0.0.1", "--port", "3000"]
    public_base_url_env: "VOX_PUBLIC_BASE_URL"
    agent_bridge:
      # Choose exactly one bridge after reviewing the service recipe docs.
      http_url_env: "VOX_AGENT_URL"
      subprocess_cmd_env: "VOX_AGENT_CMD"
    required_env:
      - OPENAI_API_KEY
      - VOX_PUBLIC_BASE_URL
      - TWILIO_ACCOUNT_SID
      - TWILIO_AUTH_TOKEN
